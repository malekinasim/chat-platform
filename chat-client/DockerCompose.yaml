services:
  chat-server:
    image: chat-server
    container_name: chat-server
    ports:
      - "8080:8080" # TCP chat server
      - "8081:8081" # HTTP API, if the server has one
    environment:
      CHAT_SERVER_PORT: 8080
      SERVER_PORT: 8081

  chat-client-1:
    image: chat-client
    container_name: chat-client-1
    ports:
      - "8082:8082"
    environment:
      CHAT_SERVER_HOST: chat-server
      CHAT_SERVER_PORT: 8080
      SERVER_PORT: 8082
    depends_on:
      - chat-server